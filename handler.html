<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Handler - TypeFast</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .handler-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--auth-bg, #0f172a);
            padding: 1rem;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .handler-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .logo { margin-bottom: 1.5rem; font-size: 1.8rem; font-weight: 800; }
        .logo-icon { color: #facc15; }
        .handler-card h2 { color: #fff; margin-bottom: 0.5rem; font-size: 1.6rem; }
        .handler-card p { opacity: 0.6; font-size: 0.9rem; margin-bottom: 2rem; }
        
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; opacity: 0.4; margin-bottom: 0.5rem; }
        .input-group-relative { position: relative; }
        .input-group input { width: 100%; padding: 0.85rem 1rem; padding-right: 2.5rem; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; font-size: 0.95rem; transition: 0.3s; }
        .input-group input:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }

        .toggle-password { position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .toggle-password:hover { opacity: 1; }
        
        .status-msg { margin-top: 1.25rem; font-size: 0.85rem; padding: 0.75rem; border-radius: 10px; display: none; line-height: 1.4; }
        .status-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

        .full-btn {
            width: 100%; padding: 0.9rem; border-radius: 14px; border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
            font-weight: 800; font-size: 1rem; cursor: pointer;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .full-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(99, 102, 241, 0.5); }
        .full-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        .blob {
            position: absolute; width: 300px; height: 300px; border-radius: 50%;
            filter: blur(80px); opacity: 0.3; z-index: 1; pointer-events: none;
        }
        .blob-1 { background: #6366f1; top: -100px; left: -100px; }
        .blob-2 { background: #a855f7; bottom: -100px; right: -100px; }
    </style>
</head>
<body class="dark-theme">
    <div class="handler-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="handler-card">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text" style="color:white; font-family: 'Outfit', sans-serif;">TypeFast</span>
            </div>

            <!-- RESET PASSWORD SECTION -->
            <div id="reset-section" style="display:none;">
                <h2>New Password</h2>
                <p>Set a strong password for your account</p>
                <div class="input-group">
                    <label>New Password</label>
                    <div class="input-group-relative">
                        <input type="password" id="new-password" placeholder="••••••••">
                        <span class="toggle-password" id="eye-toggle">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-group-relative">
                        <input type="password" id="confirm-password" placeholder="Re-type password">
                        <span class="toggle-password" id="eye-toggle-confirm">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>
                <button id="save-btn" class="full-btn">Save Password</button>
            </div>

            <!-- EMAIL VERIFY SECTION -->
            <div id="verify-section" style="display:none;">
                <h2>Verifying Email</h2>
                <p>Please wait while we confirm your email address...</p>
                <div class="spinner" style="margin: 2rem auto; width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>
            <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

            <!-- DONE SECTION -->
            <div id="done-section" style="display:none;">
                <h2 id="done-title" style="color: #10b981;">Success!</h2>
                <p id="done-msg">Your action has been completed.</p>
                <a href="auth.html" class="full-btn" style="text-decoration:none; display: inline-block;">Go to Login Page</a>
            </div>

            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>

    <script>
        // Extract parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');

        const resetSection = document.getElementById('reset-section');
        const verifySection = document.getElementById('verify-section');
        const doneSection = document.getElementById('done-section');
        const statusEl = document.getElementById('status');
        const eyeToggle = document.getElementById('eye-toggle');
        const eyeToggleConfirm = document.getElementById('eye-toggle-confirm');
        const passInput = document.getElementById('new-password');
        const confirmPassInput = document.getElementById('confirm-password');

        if (!oobCode && mode !== 'test') {
            window.location.href = 'index.html';
        }

        // Toggle Password Visibility
        function setupToggle(toggle, input) {
            toggle.addEventListener('click', () => {
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                toggle.style.opacity = type === 'text' ? '1' : '0.4';
            });
        }
        setupToggle(eyeToggle, passInput);
        setupToggle(eyeToggleConfirm, confirmPassInput);

        // Handle Modes
        switch (mode) {
            case 'resetPassword':
                resetSection.style.display = 'block';
                handleReset();
                break;
            case 'verifyEmail':
                verifySection.style.display = 'block';
                handleVerify();
                break;
            default:
                showStatus("Wait, something is wrong. Please request the link again.", true);
        }

        async function handleReset() {
            document.getElementById('save-btn').addEventListener('click', async () => {
                const newPass = passInput.value;
                const confirmPass = confirmPassInput.value;

                if (newPass.length < 6) {
                    showStatus("Password must be at least 6 characters long.", true);
                    return;
                }
                if (newPass !== confirmPass) {
                    showStatus("Passwords do not match! Please check again.", true);
                    return;
                }

                try {
                    const btn = document.getElementById('save-btn');
                    btn.disabled = true;
                    btn.textContent = "Saving...";
                    
                    await auth.confirmPasswordReset(oobCode, newPass);
                    showDone("Password Updated! ✅", "Your password has been reset successfully. You can now login with your new credentials.");
                } catch (err) {
                    const btn = document.getElementById('save-btn');
                    btn.disabled = false;
                    btn.textContent = "Save Password";
                    
                    let friendlyMsg = "Failed: ";
                    if (err.code === 'auth/weak-password') {
                        friendlyMsg = "This password is too weak. Try adding symbols or numbers.";
                    } else if (err.code === 'auth/expired-action-code') {
                        friendlyMsg = "This link has expired. Request a new one.";
                    } else if (err.code === 'auth/invalid-action-code') {
                        friendlyMsg = "Invalid or used link. Request a new password reset.";
                    } else {
                        friendlyMsg += err.message;
                    }
                    showStatus(friendlyMsg, true);
                }
            });
        }

        async function handleVerify() {
            try {
                await auth.applyActionCode(oobCode);
                showDone("Email Verified! ⚡", "Welcome back! Your email address has been confirmed successfully.");
            } catch (err) {
                showStatus("Verification failed: " + err.message, true);
            }
        }

        function showStatus(msg, isError) {
            statusEl.textContent = msg;
            statusEl.className = `status-msg ${isError ? 'status-error' : 'status-success'}`;
            statusEl.style.display = 'block';
        }

        function showDone(title, msg) {
            resetSection.style.display = 'none';
            verifySection.style.display = 'none';
            doneSection.style.display = 'block';
            statusEl.style.display = 'none';
            document.getElementById('done-title').textContent = title;
            document.getElementById('done-msg').textContent = msg;
        }
    </script>
</body>
</html>
